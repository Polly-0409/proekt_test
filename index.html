<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
      color: #1a1a1a;
      background: linear-gradient(160deg, #f8f6ff 0%, #eef8f4 100%);
      padding: 2rem 1.25rem;
    }
    main {
      max-width: 36rem;
      margin: 0 auto;
      background: #fff;
      padding: 2rem 1.75rem;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }
    h1 {
      margin: 0 0 1.25rem;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    ul {
      margin: 0;
      padding-left: 1.25rem;
    }
    li {
      margin-bottom: 0.5rem;
    }
    li:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Генератор идей для постов</h1>
    <ul>
      <li>5 идей постов для экспертов</li>
      <li>3 идеи сторис на сегодня</li>
      <li>контент план на неделю</li>
    </ul>
  </main>
</body>
</html>
