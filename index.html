<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --ink: #14121f;
      --ink-soft: #3d3750;
      --surface: rgba(255, 255, 255, 0.72);
      --surface-border: rgba(255, 255, 255, 0.55);
      --accent: #6c5ce7;
      --accent-glow: rgba(108, 92, 231, 0.35);
      --coral: #ff6b6b;
      --mint: #26de81;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      line-height: 1.55;
      color: var(--ink);
      padding: clamp(1.5rem, 4vw, 3rem) 1.25rem;
      overflow-x: hidden;
      position: relative;
      background: #0f0d18;
    }

    /* Живой градиентный фон */
    .bg-blobs {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-blobs span {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: blob-float 18s ease-in-out infinite;
    }

    .bg-blobs span:nth-child(1) {
      width: min(55vw, 420px);
      height: min(55vw, 420px);
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      top: -10%;
      left: -15%;
      animation-delay: 0s;
    }

    .bg-blobs span:nth-child(2) {
      width: min(45vw, 380px);
      height: min(45vw, 380px);
      background: linear-gradient(135deg, #fd79a8, #e17055);
      bottom: -5%;
      right: -10%;
      animation-delay: -6s;
    }

    .bg-blobs span:nth-child(3) {
      width: min(40vw, 320px);
      height: min(40vw, 320px);
      background: linear-gradient(135deg, #00cec9, #55efc4);
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -12s;
      opacity: 0.4;
    }

    @keyframes blob-float {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      33% {
        transform: translate(4%, 6%) scale(1.05);
      }
      66% {
        transform: translate(-3%, 3%) scale(0.95);
      }
    }

    .bg-blobs span:nth-child(3) {
      animation-name: blob-float-center;
    }

    @keyframes blob-float-center {
      0%, 100% {
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        transform: translate(-48%, -54%) scale(1.08);
      }
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 32rem;
      margin: 0 auto;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: clamp(1.75rem, 4vw, 2.5rem);
      border-radius: 20px;
      border: 1px solid var(--surface-border);
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.12),
        0 0 0 1px rgba(255, 255, 255, 0.08) inset;
      animation: card-in 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
      transform: translateY(20px) scale(0.98);
    }

    @keyframes card-in {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    h1 {
      margin: 0 0 1.75rem;
      font-family: "Outfit", sans-serif;
      font-size: clamp(1.65rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      background: linear-gradient(120deg, var(--ink) 0%, #4a4370 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: title-in 0.85s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
      opacity: 0;
    }

    @keyframes title-in {
      from {
        opacity: 0;
        transform: translateY(12px);
        filter: blur(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    li {
      margin: 0;
      padding: 1rem 1rem 1rem 3.25rem;
      position: relative;
      background: rgba(255, 255, 255, 0.55);
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      color: var(--ink-soft);
      font-weight: 500;
      font-size: 0.95rem;
      cursor: default;
      transition:
        transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.35s ease,
        border-color 0.35s ease,
        background 0.35s ease;
      opacity: 0;
      transform: translateX(-12px);
      animation: item-in 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    li:nth-child(1) {
      animation-delay: 0.45s;
    }

    li:nth-child(2) {
      animation-delay: 0.58s;
    }

    li:nth-child(3) {
      animation-delay: 0.71s;
    }

    @keyframes item-in {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    li::before {
      content: "";
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.35s ease;
    }

    li:nth-child(2)::before {
      background: var(--coral);
      box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.35);
    }

    li:nth-child(3)::before {
      background: var(--mint);
      box-shadow: 0 0 0 3px rgba(38, 222, 129, 0.35);
    }

    li:hover {
      transform: translateX(6px) scale(1.01);
      box-shadow:
        0 12px 32px rgba(108, 92, 231, 0.12),
        0 0 0 1px rgba(108, 92, 231, 0.15);
      border-color: rgba(108, 92, 231, 0.25);
      background: rgba(255, 255, 255, 0.9);
    }

    li:hover::before {
      transform: translateY(-50%) scale(1.25);
      box-shadow: 0 0 0 6px var(--accent-glow);
    }

    li:nth-child(2):hover::before {
      box-shadow: 0 0 0 6px rgba(255, 107, 107, 0.35);
    }

    li:nth-child(3):hover::before {
      box-shadow: 0 0 0 6px rgba(38, 222, 129, 0.35);
    }

    /* Уважение к настройкам доступности */
    @media (prefers-reduced-motion: reduce) {
      .bg-blobs span,
      main,
      h1,
      li {
        animation: none !important;
        opacity: 1;
        transform: none;
      }

      li {
        transition: none;
      }

      li:hover {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
  </div>
  <main>
    <h1>Генератор идей для постов</h1>
    <ul>
      <li>5 идей постов для экспертов</li>
      <li>3 идеи сторис на сегодня</li>
      <li>контент план на неделю</li>
    </ul>
  </main>
</body>
</html>
